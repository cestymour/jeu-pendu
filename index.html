<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- SEO & description -->
  <title>🎭 Jeu du Pendu</title>
  <meta name="description" content="Un jeu du pendu moderne, bilingue FR/EN, avec catégories et difficultés.">
  <meta name="author" content="Pendu App">
  <meta name="keywords" content="pendu, jeu, hangman, français, anglais, mobile">

  <!-- Theme color (dark) -->
  <meta name="theme-color" content="#0d0d1a">

  <!-- PWA : pas de barre de navigateur sur iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pendu">

  <!-- Open Graph (partage réseaux sociaux) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="🎭 Jeu du Pendu">
  <meta property="og:description" content="Un jeu du pendu moderne, bilingue FR/EN, avec catégories et difficultés.">
  <meta property="og:image" content="./icons/icon-512.png">

  <!-- Manifest PWA -->
  <link rel="manifest" href="./manifest.json">

  <!-- Icône classique navigateur -->
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-96.png">
  <link rel="shortcut icon" href="./icons/icon-96.png">

  <!-- Icônes Apple Touch -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-128.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-192.png">

  <!-- Enregistrement du Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./sw.js")
          .then(reg => console.log("[PWA] Service Worker enregistré :", reg.scope))
          .catch(err => console.warn("[PWA] Échec de l'enregistrement :", err));
      });
    }
  </script>

<style>
  :root {
    --bg: #0d0d1a;
    --card: #161630;
    --card2: #1e1e3f;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d2d5e;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
  body { display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 12px; }

  .wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }

  /* HEADER */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
  .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, var(--accent2), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .score-box { display: flex; gap: 10px; font-size: 0.8rem; font-weight: 700; }
  .score-item { padding: 5px 10px; border-radius: 8px; }
  .score-win { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .score-lose { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-settings { background: var(--card2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; transition: all .2s; }
  .btn-settings:hover { color: var(--accent2); border-color: var(--accent); }

  /* GAME CARD */
  .game-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }

  /* CATEGORY + LIVES */
  .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: .5px; text-transform: uppercase; }
  .badge-cat { background: rgba(168,85,247,0.15); color: var(--accent2); border: 1px solid rgba(168,85,247,0.3); }
  .lives { display: flex; gap: 4px; }
  .heart { font-size: 1.1rem; transition: transform 0.3s; }
  .heart.lost { opacity: 0.25; transform: scale(0.8); }

  /* SVG HANGMAN */
  .svg-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
  .svg-wrap svg { width: 180px; height: 180px; }
  .part { fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke-dashoffset 0.4s ease; }
  .gallows { stroke: var(--border); stroke-width: 4; }
  .body-part { stroke: var(--accent2); stroke-width: 4; stroke-dasharray: 200; stroke-dashoffset: 200; }
  .body-part.show { stroke-dashoffset: 0; }
  #h-head { fill: none; stroke: var(--accent2); stroke-width: 4; stroke-dasharray: 100; stroke-dashoffset: 100; }
  #h-head.show { stroke-dashoffset: 0; }
  #h-face { fill: none; stroke: var(--red); stroke-width: 2.5; stroke-dasharray: 50; stroke-dashoffset: 50; transition: stroke-dashoffset 0.4s ease 0.4s; }
  #h-face.show { stroke-dashoffset: 0; }

  /* WORD */
  .word-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 55px; align-items: center; }
  .letter-box { width: 32px; height: 44px; border-bottom: 3px solid var(--accent); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; transition: all 0.3s; position: relative; }
  .letter-box.revealed { color: var(--green); border-color: var(--green); animation: popIn 0.3s ease; }
  .letter-box.wrong-reveal { color: var(--red); border-color: var(--red); }
  @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

  /* HINT */
  .hint-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
  .btn-hint { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: var(--blue); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all .2s; }
  .btn-hint:hover:not(:disabled) { background: rgba(59,130,246,0.25); }
  .btn-hint:disabled { opacity: 0.35; cursor: not-allowed; }
  .hint-text { font-size: 0.8rem; color: var(--muted); align-self: center; font-style: italic; }

  /* KEYBOARD */
  .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .key { aspect-ratio: 1; border: none; border-radius: 8px; background: var(--card2); color: var(--text); font-size: 1rem; font-weight: 700; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; text-transform: uppercase; }
  .key:active { transform: scale(0.9); }
  .key:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
  .key:disabled { cursor: not-allowed; }
  .key.k-correct { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }
  .key.k-wrong { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: rgba(239,68,68,0.4); }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 380px; transform: scale(0.9); transition: transform 0.3s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h2 { font-size: 1.6rem; margin-bottom: 8px; }
  .modal .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 22px; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .field select { width: 100%; padding: 11px 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; cursor: pointer; appearance: none; }
  .field select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: opacity .2s; }
  .btn-primary:hover { opacity: 0.85; }
  .result-icon { font-size: 3.5rem; margin-bottom: 10px; animation: bounce 0.6s ease; }
  .result-word { display: inline-block; margin: 10px 0 18px; padding: 6px 16px; background: var(--card2); border-radius: 8px; font-size: 1.2rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-12px)} 70%{transform:translateY(-6px)} }
  .result-stats { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; }
  .result-stat { text-align: center; }
  .result-stat .val { font-size: 1.4rem; font-weight: 800; }
  .result-stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }

  /* WIN CONFETTI */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
  .confetto { position: absolute; width: 8px; height: 8px; opacity: 0; animation: fall 2s ease forwards; border-radius: 2px; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <div class="logo">🎭 PENDU</div>
    <div class="score-box">
      <div class="score-item score-win" id="sc-win">✅ 0</div>
      <div class="score-item score-lose" id="sc-lose">❌ 0</div>
    </div>
    <button class="btn-settings" id="btn-settings" title="Paramètres">⚙️</button>
  </div>

  <!-- Main game -->
  <div class="game-card">
    <!-- Meta -->
    <div class="meta">
      <span class="badge badge-cat" id="cat-badge">—</span>
      <div class="lives" id="lives-row"></div>
    </div>

    <!-- SVG Hangman -->
    <div class="svg-wrap">
      <svg viewBox="0 0 200 200">
        <!-- Gallows -->
        <line class="part gallows" x1="20" y1="190" x2="100" y2="190"/>
        <line class="part gallows" x1="60" y1="190" x2="60" y2="15"/>
        <line class="part gallows" x1="60" y1="15"  x2="140" y2="15"/>
        <line class="part gallows" x1="140" y1="15" x2="140" y2="45"/>
        <!-- Body parts -->
        <circle id="h-head" class="part" cx="140" cy="62" r="18"/>
        <line id="h-body"     class="part body-part" x1="140" y1="80"  x2="140" y2="135"/>
        <line id="h-arm-l"   class="part body-part" x1="140" y1="95"  x2="115" y2="118"/>
        <line id="h-arm-r"   class="part body-part" x1="140" y1="95"  x2="165" y2="118"/>
        <line id="h-leg-l"   class="part body-part" x1="140" y1="135" x2="118" y2="165"/>
        <line id="h-leg-r"   class="part body-part" x1="140" y1="135" x2="162" y2="165"/>
        <!-- Face (shown on death) -->
        <g id="h-face" class="part">
          <line x1="133" y1="57" x2="137" y2="61"/>
          <line x1="137" y1="57" x2="133" y2="61"/>
          <line x1="143" y1="57" x2="147" y2="61"/>
          <line x1="147" y1="57" x2="143" y2="61"/>
          <path d="M133 70 Q140 65 147 70" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <!-- Word display -->
    <div class="word-row" id="word-row"></div>

    <!-- Hint -->
    <div class="hint-row">
      <button class="btn-hint" id="btn-hint">💡 Indice</button>
      <span class="hint-text" id="hint-text"></span>
    </div>
  </div>

  <!-- Keyboard -->
  <div class="game-card">
    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay open" id="modal-settings">
  <div class="modal">
    <h2>🎮 Jeu du Pendu</h2>
    <p class="sub">Configure ta partie et lance-toi !</p>
    <div class="field">
      <label>Langue</label>
      <select id="sel-lang">
        <option value="fr">🇫🇷 Français</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>
    <div class="field">
      <label>Catégorie</label>
      <select id="sel-cat"></select>
    </div>
    <div class="field">
      <label>Difficulté</label>
      <select id="sel-diff">
        <option value="8">😊 Facile — 8 erreurs max</option>
        <option value="6" selected>😐 Moyen — 6 erreurs max</option>
        <option value="4">😈 Difficile — 4 erreurs max</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-start">🚀 Démarrer la partie</button>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="modal-result">
  <div class="modal" style="text-align:center">
    <div class="result-icon" id="res-icon"></div>
    <h2 id="res-title"></h2>
    <p class="sub" id="res-sub"></p>
    <div class="result-word" id="res-word"></div>
    <div class="result-stats">
      <div class="result-stat"><div class="val" id="res-wins" style="color:var(--green)">0</div><div class="lbl">Victoires</div></div>
      <div class="result-stat"><div class="val" id="res-losses" style="color:var(--red)">0</div><div class="lbl">Défaites</div></div>
    </div>
    <button class="btn-primary" id="btn-replay">🔁 Rejouer</button>
  </div>
</div>

<!-- Confetti -->
<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const WORDS = {
  fr: {
    "🐾 Animaux":    ["elephant","girafe","kangourou","dauphin","pingouin","leopard","crocodile","chauve-souris","grenouille","cameleon"],
    "🍎 Fruits":     ["ananas","myrtille","pasteque","framboises","mangue","grenade","litchi","physalis","kiwi","mandarine"],
    "🌍 Pays":       ["madagascar","australie","venezuela","kazakhstan","mozambique","azerbaidjan","islande","birmanie","equateur","zimbabwe"],
    "⚽ Sports":     ["badminton","volleyball","escrime","pentathlon","canoekayak","halteres","pentathlon","triathlon","cyclisme","skateboard"],
    "💻 Tech":       ["algorithme","programmation","interface","processeur","javascript","cryptographie","intelligence","navigateur","pare-feu","virtualisation"],
    "🍕 Cuisine":    ["courgette","aubergine","brocoli","choufleur","gingembre","citronnelle","cardamome","charcuterie","mayonnaise","hollandaise"],
    "🎬 Cinéma":     ["avengers","inception","intouchables","amelie","parasite","gladiator","scarface","magnolia","memento","prettywoman"],
  },
  en: {
    "🐾 Animals":    ["elephant","giraffe","kangaroo","dolphin","penguin","crocodile","chimpanzee","rhinoceros","orangutan","chameleon"],
    "🍎 Fruits":     ["pineapple","blueberry","watermelon","raspberry","mango","pomegranate","lychee","strawberry","blackberry","grapefruit"],
    "🌍 Countries":  ["madagascar","australia","venezuela","kazakhstan","mozambique","azerbaijan","iceland","switzerland","argentina","zimbabwe"],
    "⚽ Sports":     ["badminton","volleyball","fencing","triathlon","gymnastics","weightlifting","skateboard","basketball","snowboarding","archery"],
    "💻 Tech":       ["algorithm","programming","javascript","cryptography","intelligence","processor","framework","virtualization","kubernetes","cybersecurity"],
    "🍕 Food":       ["zucchini","aubergine","broccoli","cauliflower","gingerbread","croissant","macaroon","cheesecake","quesadilla","guacamole"],
    "🎬 Movies":     ["inception","gladiator","parasite","magnolia","scarface","memento","avengers","interstellar","shawshank","godfather"],
  }
};

const PARTS = ["h-head","h-body","h-arm-l","h-arm-r","h-leg-l","h-leg-r","h-face"];

let state = {
  word: "", guessed: new Set(), wrong: 0,
  maxWrong: 6, hintUsed: false, active: false,
  lang: "fr", cat: "", wins: 0, losses: 0
};

// DOM
const $ = id => document.getElementById(id);
const selLang  = $("sel-lang"), selCat = $("sel-cat"), selDiff = $("sel-diff");
const btnStart  = $("btn-start"), btnSettings = $("btn-settings");
const btnHint   = $("btn-hint"), hintText = $("hint-text");
const btnReplay = $("btn-replay");
const wordRow   = $("word-row"), keyboard = $("keyboard");
const livesRow  = $("lives-row"), catBadge = $("cat-badge");
const scWin = $("sc-win"), scLose = $("sc-lose");
const modalSettings = $("modal-settings"), modalResult = $("modal-result");
const confettiWrap  = $("confetti-wrap");

// Populate categories
function fillCats() {
  const lang = selLang.value;
  selCat.innerHTML = Object.keys(WORDS[lang]).map(c => `<option value="${c}">${c}</option>`).join("");
}
selLang.addEventListener("change", fillCats);
fillCats();

// Start game
btnStart.addEventListener("click", () => {
  state.lang    = selLang.value;
  state.cat     = selCat.value;
  state.maxWrong = parseInt(selDiff.value);
  modalSettings.classList.remove("open");
  startGame();
});
btnSettings.addEventListener("click", () => modalSettings.classList.add("open"));
btnReplay.addEventListener("click", () => { modalResult.classList.remove("open"); startGame(); });

function startGame() {
  const list = WORDS[state.lang][state.cat];
  state.word    = list[Math.floor(Math.random() * list.length)];
  state.guessed = new Set();
  state.wrong   = 0;
  state.hintUsed= false;
  state.active  = true;

  catBadge.textContent = state.cat;
  hintText.textContent = "";
  btnHint.disabled = false;

  renderLives();
  renderHangman();
  renderWord();
  renderKeyboard();
}

// Lives hearts
function renderLives() {
  livesRow.innerHTML = "";
  for (let i = 0; i < state.maxWrong; i++) {
    const h = document.createElement("span");
    h.className = "heart" + (i < state.maxWrong ? "" : " lost");
    h.textContent = "❤️";
    h.id = `heart-${i}`;
    livesRow.appendChild(h);
  }
  updateLives();
}
function updateLives() {
  for (let i = 0; i < state.maxWrong; i++) {
    const h = $(`heart-${i}`);
    if (h) h.className = "heart" + (i >= state.maxWrong - state.wrong ? " lost" : "");
  }
}

// Hangman SVG
function renderHangman() {
  PARTS.forEach(id => {
    const el = $(id);
    if (el) el.classList.remove("show");
  });
}
function updateHangman() {
  const partsToShow = Math.min(state.wrong, PARTS.length);
  for (let i = 0; i < partsToShow; i++) {
    const el = $(PARTS[i]);
    if (el) el.classList.add("show");
  }
}

// Word display
function renderWord(revealAll = false) {
  wordRow.innerHTML = "";
  state.word.split("").forEach(ch => {
    const box = document.createElement("div");
    if (ch === "-") {
      box.className = "letter-box revealed";
      box.textContent = "-";
    } else if (state.guessed.has(ch) || revealAll) {
      box.className = "letter-box " + (revealAll && !state.guessed.has(ch) ? "wrong-reveal" : "revealed");
      box.textContent = ch;
    } else {
      box.className = "letter-box";
      box.textContent = "";
    }
    wordRow.appendChild(box);
  });
}

// Keyboard
function renderKeyboard() {
  keyboard.innerHTML = "";
  "abcdefghijklmnopqrstuvwxyz".split("").forEach(ch => {
    const btn = document.createElement("button");
    btn.className = "key";
    btn.textContent = ch;
    btn.dataset.ch = ch;
    btn.addEventListener("click", () => guess(ch, btn));
    keyboard.appendChild(btn);
  });
}

// Guess
function guess(ch, btn) {
  if (!state.active || state.guessed.has(ch)) return;
  state.guessed.add(ch);
  btn.disabled = true;

  if (state.word.includes(ch)) {
    btn.classList.add("k-correct");
    renderWord();
    checkWin();
  } else {
    btn.classList.add("k-wrong");
    state.wrong++;
    updateLives();
    updateHangman();
    checkLose();
  }
}

// Hint
btnHint.addEventListener("click", () => {
  if (state.hintUsed || !state.active) return;
  const hidden = state.word.split("").filter(c => c !== "-" && !state.guessed.has(c));
  if (!hidden.length) return;
  const pick = hidden[Math.floor(Math.random() * hidden.length)];
  const btn = keyboard.querySelector(`[data-ch="${pick}"]`);
  if (btn) guess(pick, btn);
  state.hintUsed = true;
  btnHint.disabled = true;
  hintText.textContent = `La lettre "${pick.toUpperCase()}" révélée !`;
});

// Win / Lose
function checkWin() {
  const won = state.word.split("").every(c => c === "-" || state.guessed.has(c));
  if (won) endGame(true);
}
function checkLose() {
  if (state.wrong >= state.maxWrong) endGame(false);
}

function endGame(win) {
  state.active = false;
  renderWord(!win);

  if (win) { state.wins++; launchConfetti(); }
  else      { state.losses++; }

  scWin.textContent  = `✅ ${state.wins}`;
  scLose.textContent = `❌ ${state.losses}`;

  $("res-icon").textContent  = win ? "🎉" : "💀";
  $("res-title").textContent = win ? "Bravo !" : "Perdu...";
  $("res-sub").textContent   = win
    ? `Tu as trouvé le mot en ${state.wrong} erreur${state.wrong > 1 ? "s" : ""} !`
    : `Le mot était :`;
  $("res-word").textContent  = state.word.toUpperCase();
  $("res-word").style.color  = win ? "var(--green)" : "var(--red)";
  $("res-wins").textContent  = state.wins;
  $("res-losses").textContent= state.losses;

  setTimeout(() => modalResult.classList.add("open"), 600);
}

// Confetti 🎊
function launchConfetti() {
  confettiWrap.innerHTML = "";
  const colors = ["#7c3aed","#a855f7","#22c55e","#f59e0b","#3b82f6","#ef4444","#ec4899"];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement("div");
    c.className = "confetto";
    c.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-delay: ${Math.random() * 0.8}s;
      animation-duration: ${1.5 + Math.random()}s;
      transform: rotate(${Math.random() * 360}deg);
      border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
    `;
    confettiWrap.appendChild(c);
  }
  setTimeout(() => confettiWrap.innerHTML = "", 3000);
}

// Keyboard physique
document.addEventListener("keydown", e => {
  if (!state.active) return;
  const ch = e.key.toLowerCase();
  if (/^[a-z]$/.test(ch)) {
    const btn = keyboard.querySelector(`[data-ch="${ch}"]`);
    if (btn && !btn.disabled) guess(ch, btn);
  }
});
</script>
